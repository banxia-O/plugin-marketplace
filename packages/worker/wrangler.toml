name = "plugin-marketplace-api"
main = "src/index.ts"
compatibility_date = "2025-01-09"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "plugin-marketplace"
database_id = "2e9accf5-8e78-4e9b-8810-bbb0bf9f360e"
migrations_dir = "migrations"

# KV 缓存绑定
[[kv_namespaces]]
binding = "CACHE"
id = "d70868a07c3345058589ca0b1cc2abf2"

# 每天 UTC 17:00（北京时间凌晨 1:00）同步 GitHub 仓库元数据
[triggers]
crons = ["0 17 * * *"]

